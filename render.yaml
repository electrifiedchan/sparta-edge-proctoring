services:
  # ----------------------------------------
  # 1. PYTHON BACKEND (FastAPI API Server)
  # ----------------------------------------
  - type: web
    name: sparta-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  # ----------------------------------------
  # 2. NEXT.JS FRONTEND (User Interface)
  # ----------------------------------------
  - type: web
    name: sparta-frontend
    env: node
    rootDir: frontend
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://sparta-backend.onrender.com" # Update this value after backend is deployed
      - key: NEXT_PUBLIC_GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
